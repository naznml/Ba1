<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Биология | Көп жауапты тест</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: #111827;
      line-height: 1.55;
    }

    .container {
      width: min(1120px, 94%);
      margin: 0 auto;
      padding: 24px 0 70px;
    }

    .hero {
      background: linear-gradient(135deg, #1d4ed8, #2563eb, #0f766e);
      color: #ffffff;
      border-radius: 26px;
      padding: 34px 24px;
      margin-bottom: 22px;
      box-shadow: 0 16px 38px rgba(37, 99, 235, 0.22);
    }

    .hero h1 {
      font-size: clamp(30px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.96;
    }

    .info-box {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
    }

    .info-box strong {
      color: #1d4ed8;
    }

    .test-panel {
      background: #ffffff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
    }

    .test-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 18px;
      margin-bottom: 18px;
    }

    .test-header h2 {
      font-size: 27px;
      color: #0f172a;
    }

    .test-header p {
      color: #475569;
      font-weight: 700;
    }

    .badge {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 9px 15px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
    }

    .question {
      border: 1px solid #e2e8f0;
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .question-title {
      font-weight: 850;
      color: #0f172a;
      margin-bottom: 13px;
      font-size: 17px;
    }

    .multi-note {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      font-weight: 800;
      color: #0369a1;
      background: #e0f2fe;
      padding: 5px 9px;
      border-radius: 999px;
    }

    .options {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #dbe3ee;
      background: #f8fafc;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .option:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }

    .option input {
      margin-top: 4px;
      accent-color: #2563eb;
      transform: scale(1.08);
    }

    .option.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #14532d;
      font-weight: 800;
    }

    .option.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #7f1d1d;
      font-weight: 800;
    }

    .answer-box {
      display: none;
      margin-top: 13px;
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border-left: 5px solid #2563eb;
    }

    .answer-box.show {
      display: block;
    }

    .answer-box strong {
      color: #1d4ed8;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .btn {
      border: 0;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 900;
      transition: 0.18s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .result-box {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #ecfdf5;
      border: 1px solid #86efac;
      color: #14532d;
      font-size: 21px;
      font-weight: 900;
    }

    .result-box.show {
      display: block;
    }

    @media (max-width: 560px) {
      .container {
        width: 95%;
        padding-top: 16px;
      }

      .hero {
        padding: 26px 18px;
        border-radius: 22px;
      }

      .test-panel {
        padding: 15px;
      }

      .question {
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="hero">
      <h1>Биология</h1>
      <p>20 сұрақ | Бір немесе бірнеше дұрыс жауап</p>
    </section>

    <section class="info-box">
      <p><strong>Нұсқаулық:</strong> файлда қалай берілсе, солай: A, B, C, D, E, F, G, H варианттары сақталады. Бірнеше дұрыс жауап болса, бірнешеуін белгілеңіз.</p>
    </section>

    <section class="test-panel">
      <div class="test-header">
        <div>
          <h2>1-нұсқа</h2>
          <p>Көп жауапты тест</p>
        </div>
        <div class="badge">20 сұрақ</div>
      </div>

      <div id="questions"></div>

      <div class="actions">
        <button class="btn btn-primary" onclick="showResult()">Нәтижені көрсету</button>
        <button class="btn btn-secondary" onclick="resetTest()">Қайта тапсыру</button>
      </div>

      <div class="result-box" id="resultBox"></div>
    </section>
  </main>

  <script>
    const questions = [
            {
        text: "Бацилла жасушасының пішіні",
        options: [
          "таяқша тәрізді",
          "сопақ тәрізді",
          "үтір тәрізді",
          "тор тәрізді",
          "шар тәрізді"
        ],
        correct: [0],
        explanation: "Бацилла — таяқша тәрізді бактерия."
      },
      {
        text: "Жоғары сатыдағы өсімдіктердің негізгі вегетативтік мүшесі",
        options: [
          "гүлшоғыры",
          "тұқым",
          "жеміс",
          "тамыр",
          "гүл"
        ],
        correct: [3],
        explanation: "Жоғары сатыдағы өсімдіктердің негізгі вегетативтік мүшелеріне тамыр, сабақ, жапырақ жатады. Берілген нұсқалар ішінде дұрыс жауап — тамыр."
      },
      {
        text: "Меристема",
        options: [
          "түзуші ұлпа",
          "жабындық ұлпа",
          "ассимиляциялық ұлпа",
          "қор жинаушы ұлпа",
          "қабылдаушы ұлпа"
        ],
        correct: [0],
        explanation: "Меристема — түзуші ұлпа."
      },
      {
        text: "Төменгі сатыдағы өсімдіктердің вегетативті денесі бөлінеді",
        options: [
          "тамырға",
          "жеміске",
          "сабаққа",
          "жапыраққа",
          "бөлінбейді"
        ],
        correct: [4],
        explanation: "Төменгі сатыдағы өсімдіктердің денесі мүшелерге бөлінбейді."
      },
      {
        text: "Жоғары сатыдағы өсімдіктердің төменгі сатыдағы өсімдіктерден ерекшелігі",
        options: [
          "тыныс алуы",
          "вегетативті дене",
          "морфологиялық мүшелерге бөлінеді",
          "төзімділік деңгейі",
          "спора түзеді"
        ],
        correct: [2],
        explanation: "Жоғары сатыдағы өсімдіктерде дене морфологиялық мүшелерге бөлінеді."
      },
      {
        text: "Қарапайымдылар жүйесіне жатпайтын тип",
        options: [
          "инфузориялар",
          "споралылар",
          "книдоспоридиялар",
          "саркомастигофоралар",
          "вирустар"
        ],
        correct: [4],
        explanation: "Вирустар қарапайымдылар жүйесіне жатпайды."
      },
      {
        text: "Сифонофоралар класс тармағына жататындар",
        options: [
          "гидромедузалар",
          "гидра",
          "пневматофор",
          "теңіз гидроидты полиптер",
          "хондрофора"
        ],
        correct: [3],
        explanation: "Сифонофоралар теңіз гидроидты полиптер тобына жатады."
      },
      {
        text: "Билатеральды симметриялы үш қабатты жануар",
        options: [
          "медуза",
          "моллюска",
          "сифомедуза",
          "маржан полиптері",
          "гидра"
        ],
        correct: [1],
        explanation: "Моллюскалар — билатеральды симметриялы, үш қабатты жануарлар."
      },
      {
        text: "Ұрық қабықшасы болмайтын жануарлар",
        options: [
          "сүт қоректілер",
          "рептилиялар",
          "құстар",
          "амфибиялар",
          "бауырымен жорғалаушылар"
        ],
        correct: [3],
        explanation: "Амфибияларда ұрық қабықшалары болмайды."
      },
      {
        text: "Нәруыз алмасуының нәтижесінде соңғы ыдырау өнімі несеп қышқылы болып табылатын жануарлар",
        options: [
          "амфибиялар",
          "сүйекті балықтар",
          "қос мекенділер",
          "құстар",
          "шеміршекті балықтар"
        ],
        correct: [3],
        explanation: "Құстарда азотты алмасудың соңғы өнімі несеп қышқылы түрінде бөлінеді."
      },
            {
        text: "Жасушалық құрылымы жоқ",
        options: [
          "вирус",
          "бактерия",
          "дизентериялық амёба",
          "балдырлар",
          "жасыл эвглена"
        ],
        correct: [0],
        explanation: "Жасушалық құрылымы жоқ тіршілік формасы — вирус."
      },
      {
        text: "Ішкі орта ұлпаларының негізгі топтарына жатпайды",
        options: [
          "қан мен лимфа",
          "шеміршек",
          "май ұлпасы",
          "сүйек ұлпасы",
          "қоректік орта"
        ],
        correct: [4],
        explanation: "Қан мен лимфа, шеміршек, май және сүйек ұлпалары ішкі орта ұлпаларына жатады. Қоректік орта ұлпа тобына жатпайды."
      },
      {
        text: "Висцеральды жүйенің физиологиясы",
        options: [
          "мүше және ағза жүйесінің орналасуы",
          "тері жарақаттануы",
          "мидың қабынуы",
          "жүйке жүйесінің орналасуы",
          "аяқ, қол орналасуы"
        ],
        correct: [0],
        explanation: "Берілген варианттар ішінде висцеральды жүйеге қатысты дұрыс жауап — мүше және ағза жүйесінің орналасуы."
      },
      {
        text: "Экстероцептивтік рефлекстердің орналасуы",
        options: [
          "сіңірде",
          "бұлшық етте",
          "қан тамырларында",
          "ішкі мүшелерде",
          "көздің кілегей қабықтарында"
        ],
        correct: [4],
        explanation: "Экстероцептивтік рецепторлар сыртқы орта әсерін қабылдайтын аймақтарда орналасады."
      },
      {
        text: "Тірек-қимыл аппаратының қызметі",
        options: [
          "рефлекстік, өткізгіштік",
          "қорғаныс, қозғалу",
          "қан түзу, зат алмасу",
          "азық қабылдау, қорыту",
          "ұрпақ жалғастыру, түр түзу"
        ],
        correct: [1],
        explanation: "Тірек-қимыл аппаратының негізгі қызметі — денені тіреу, қорғау және қозғалысты қамтамасыз ету."
      },
      {
        text: "Ядролық мембрана ерігеннен кейін хромосомалар экватор бағытына қарай жылжитын митоздың кезеңі",
        options: [
          "анафаза",
          "телофаза",
          "профаза",
          "метафаза",
          "прометафаза"
        ],
        correct: [4],
        explanation: "Ядролық мембрана жойылып, хромосомалар экваторға қарай қозғала бастаған кезең — прометафаза."
      },
      {
        text: "Х-тәрізді хромосомалар",
        options: [
          "моноцентрлік",
          "метацентрлік",
          "полицентрлік",
          "акроцентрлік",
          "телоцентрлік"
        ],
        correct: [1],
        explanation: "Метацентрлік хромосомаларда центромера ортаға жақын орналасып, хромосома Х-тәрізді көрінеді."
      },
      {
        text: "Дигибридті будандастыру кезінде F₂-гі мүмкіндігі бар кез келген гендер үйлесімінің біреуі бойынша гомозиготалы дарабастардың үлесі",
        options: [
          "1/4",
          "1/64",
          "1/1256",
          "1/256",
          "1/16"
        ],
        correct: [4],
        explanation: "Дигибридті будандастыруда нақты бір гомозиготалы генотиптің үлесі 1/16 болуы мүмкін."
      },
      {
        text: "Тұқым қуалайтын өзгергіштік",
        options: [
          "онтогенетикалық",
          "фенотиптік",
          "гендік",
          "модификациялық",
          "комбинативтік"
        ],
        correct: [4],
        explanation: "Комбинативтік өзгергіштік тұқым қуалайтын өзгергіштікке жатады."
      },
      {
        text: "Еріткіштің өзінен жартылай өткізгіш мембрана арқылы бөлінген ерітіндіде өтуі аталады",
        options: [
          "адгезия",
          "транспирация",
          "диффузия",
          "когезия",
          "осмос"
        ],
        correct: [4],
        explanation: "Жартылай өткізгіш мембрана арқылы еріткіштің өтуі осмос деп аталады."
      }
          ];

    const questionsContainer = document.getElementById("questions");
    const resultBox = document.getElementById("resultBox");

    function renderQuestions() {
      questionsContainer.innerHTML = questions.map((q, qIndex) => {
        const note = q.correct.length > 1
          ? `<span class="multi-note">Бірнеше дұрыс жауап бар</span>`
          : `<span class="multi-note">Бір дұрыс жауап</span>`;

        return `
          <div class="question" data-question="${qIndex}">
            <div class="question-title">
              ${qIndex + 1}. ${q.text}
              <br>
              ${note}
            </div>

            <div class="options">
              ${q.options.map((option, optIndex) => `
                <label class="option" data-option="${optIndex}">
                  <input type="checkbox" value="${optIndex}">
                  <span>${String.fromCharCode(65 + optIndex)}) ${option}</span>
                </label>
              `).join("")}
            </div>

            <div class="answer-box">
              <p>
                <strong>Дұрыс жауап:</strong>
                ${q.correct.map(i => `${String.fromCharCode(65 + i)}) ${q.options[i]}`).join("; ")}
              </p>
              <p><strong>Түсіндірме:</strong> ${q.explanation}</p>
            </div>
          </div>
        `;
      }).join("");
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;

      const sortedA = [...a].sort((x, y) => x - y);
      const sortedB = [...b].sort((x, y) => x - y);

      return sortedA.every((value, index) => value === sortedB[index]);
    }

    function showResult() {
      let score = 0;

      questions.forEach((q, qIndex) => {
        const questionEl = document.querySelector(`.question[data-question="${qIndex}"]`);
        const checkedInputs = [...questionEl.querySelectorAll("input:checked")];
        const selected = checkedInputs.map(input => Number(input.value));
        const optionEls = questionEl.querySelectorAll(".option");

        optionEls.forEach(option => {
          option.classList.remove("correct", "wrong");
        });

        q.correct.forEach(correctIndex => {
          optionEls[correctIndex].classList.add("correct");
        });

        selected.forEach(selectedIndex => {
          if (!q.correct.includes(selectedIndex)) {
            optionEls[selectedIndex].classList.add("wrong");
          }
        });

        if (arraysEqual(selected, q.correct)) {
          score++;
        }

        questionEl.querySelector(".answer-box").classList.add("show");
      });

      resultBox.classList.add("show");
      resultBox.textContent = `Сіздің нәтижеңіз: ${score}/${questions.length}`;

      resultBox.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }

    function resetTest() {
      document.querySelectorAll("input").forEach(input => {
        input.checked = false;
      });

      document.querySelectorAll(".option").forEach(option => {
        option.classList.remove("correct", "wrong");
      });

      document.querySelectorAll(".answer-box").forEach(box => {
        box.classList.remove("show");
      });

      resultBox.classList.remove("show");
      resultBox.textContent = "";

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    renderQuestions();
  </script>
</body>
</html>
